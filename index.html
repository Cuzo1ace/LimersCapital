<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!--
      CSP is managed via public/_headers (Cloudflare Pages).
      Two policies are emitted:
        - Content-Security-Policy            (enforced, currently permissive)
        - Content-Security-Policy-Report-Only (hardened, observed via /csp-report)
      Violations are forwarded from the Worker to Sentry for triage.
      Once Report-Only has zero legitimate violations for 7 days, promote the
      hardened policy to enforced (audit C-03 Phase 2).
    -->
    <title>Limer's Capital</title>
    <meta name="description" content="Caribbean DeFi education, trading & tokenization on Solana" />

    <!-- PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/pwa-64x64.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />
    <meta name="theme-color" content="#0d0e10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Limers" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div id="boot-fallback" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0e10;color:#fdfbfe;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;padding:24px;text-align:center">
        <div id="boot-spinner" style="width:32px;height:32px;border-radius:50%;border:2px solid rgba(253,251,254,.15);border-top-color:#6ee7b7;animation:boot-spin 0.9s linear infinite;margin-bottom:16px"></div>
        <div style="font-size:14px;letter-spacing:.04em;opacity:.7">Loading Limer's Capital…</div>
        <div id="boot-stuck" style="display:none;margin-top:28px;max-width:420px">
          <div style="font-size:15px;font-weight:600;margin-bottom:6px">Still loading?</div>
          <div style="font-size:13px;opacity:.65;line-height:1.5;margin-bottom:18px">Your browser may be holding a stale cached version. Clearing it usually fixes this.</div>
          <button id="boot-recover" type="button" style="padding:10px 18px;border-radius:12px;background:#6ee7b7;color:#0d0e10;font-weight:700;font-size:13px;border:none;cursor:pointer;font-family:inherit">Clear cache &amp; reload</button>
        </div>
        <noscript>
          <div style="margin-top:16px;font-size:13px;opacity:.8;max-width:420px">This app requires JavaScript to run.</div>
        </noscript>
      </div>
      <style>@keyframes boot-spin{to{transform:rotate(360deg)}}</style>
    </div>
    <!--
      Boot-recovery script — extracted from inline <script> for CSP hardening
      (audit C-03, April 2026). SRI hash pins the exact content; any edit to
      public/boot-recover.js MUST be followed by:
        openssl dgst -sha384 -binary public/boot-recover.js | openssl base64 -A
      and updating the integrity= attribute below. Otherwise the browser will
      refuse to execute the script and the boot-stuck fallback will not work.
    -->
    <script
      src="/boot-recover.js"
      integrity="sha384-6qe0DfIT+/66438fJVamlrV1M5DnPKbTK9lRwH7vMAfoRPooKO6iaK63VuQDSecf"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
