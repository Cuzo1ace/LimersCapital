<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- CSP is managed via public/_headers (Cloudflare Pages) -->
    <title>Limer's Capital</title>
    <meta name="description" content="Caribbean DeFi education, trading & tokenization on Solana" />

    <!-- PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/pwa-64x64.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />
    <meta name="theme-color" content="#0d0e10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Limers" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div id="boot-fallback" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0e10;color:#fdfbfe;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;padding:24px;text-align:center">
        <div id="boot-spinner" style="width:32px;height:32px;border-radius:50%;border:2px solid rgba(253,251,254,.15);border-top-color:#6ee7b7;animation:boot-spin 0.9s linear infinite;margin-bottom:16px"></div>
        <div style="font-size:14px;letter-spacing:.04em;opacity:.7">Loading Limer's Capital…</div>
        <div id="boot-stuck" style="display:none;margin-top:28px;max-width:420px">
          <div style="font-size:15px;font-weight:600;margin-bottom:6px">Still loading?</div>
          <div style="font-size:13px;opacity:.65;line-height:1.5;margin-bottom:18px">Your browser may be holding a stale cached version. Clearing it usually fixes this.</div>
          <button id="boot-recover" type="button" style="padding:10px 18px;border-radius:12px;background:#6ee7b7;color:#0d0e10;font-weight:700;font-size:13px;border:none;cursor:pointer;font-family:inherit">Clear cache &amp; reload</button>
        </div>
        <noscript>
          <div style="margin-top:16px;font-size:13px;opacity:.8;max-width:420px">This app requires JavaScript to run.</div>
        </noscript>
      </div>
      <style>@keyframes boot-spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      (function () {
        // If React hasn't replaced #root's contents within 8s, surface a recovery UI.
        var STUCK_MS = 8000;
        var timer = setTimeout(function () {
          var stuck = document.getElementById('boot-stuck');
          var spinner = document.getElementById('boot-spinner');
          if (stuck) stuck.style.display = 'block';
          if (spinner) spinner.style.display = 'none';
        }, STUCK_MS);
        // When React mounts, it swaps #root's children — detect via MutationObserver
        // on #root and clear the timer as soon as a non-fallback child appears.
        var root = document.getElementById('root');
        if (root && typeof MutationObserver === 'function') {
          var mo = new MutationObserver(function () {
            if (!document.getElementById('boot-fallback')) {
              clearTimeout(timer);
              mo.disconnect();
            }
          });
          mo.observe(root, { childList: true, subtree: false });
        }
        // Wire up the recovery button: unregister SWs, clear caches + storage, reload.
        document.addEventListener('click', function (e) {
          if (!e.target || e.target.id !== 'boot-recover') return;
          e.target.textContent = 'Clearing…';
          e.target.disabled = true;
          var done = function () { window.location.replace('/?reset=1'); };
          var tasks = [];
          try {
            if ('serviceWorker' in navigator) {
              tasks.push(navigator.serviceWorker.getRegistrations().then(function (rs) {
                return Promise.all(rs.map(function (r) { return r.unregister(); }));
              }));
            }
            if (typeof caches !== 'undefined' && caches.keys) {
              tasks.push(caches.keys().then(function (ks) {
                return Promise.all(ks.map(function (k) { return caches.delete(k); }));
              }));
            }
            try { localStorage.clear(); } catch (_) {}
            try { sessionStorage.clear(); } catch (_) {}
          } catch (_) {}
          Promise.all(tasks).then(done, done);
          setTimeout(done, 3000);
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
