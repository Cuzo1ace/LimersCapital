<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0e10"/>
      <stop offset="100%" stop-color="#121316"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffa3"/>
      <stop offset="100%" stop-color="#00ef99"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background for maskable safe zone -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Content within 80% safe zone (51.2px padding each side) -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#glow)" stroke-width="5" opacity="0.3"/>
  <text x="256" y="300" text-anchor="middle" font-family="'Space Grotesk',system-ui,sans-serif" font-weight="700" font-size="200" fill="url(#glow)">L</text>
  <circle cx="322" cy="330" r="12" fill="#bf81ff"/>
</svg>
