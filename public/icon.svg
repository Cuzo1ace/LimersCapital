<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0e10"/>
      <stop offset="100%" stop-color="#121316"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffa3"/>
      <stop offset="100%" stop-color="#00ef99"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glow)" stroke-width="6" opacity="0.3"/>
  <!-- L monogram -->
  <text x="256" y="310" text-anchor="middle" font-family="'Space Grotesk',system-ui,sans-serif" font-weight="700" font-size="260" fill="url(#glow)">L</text>
  <!-- Accent dot -->
  <circle cx="340" cy="350" r="16" fill="#bf81ff"/>
</svg>
