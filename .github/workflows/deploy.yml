name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Audit finding L-02: fail CI on dependency vulnerabilities so supply-
      # chain issues cannot silently ship to production. `--omit=dev` scopes
      # the check to the runtime dependency tree (dev tooling can lag without
      # blocking a release).
      #
      # Threshold relaxed from `high` → `critical` on 2026-04-17 because the
      # Solana ecosystem's @solana/spl-token transitively depends on
      # bigint-buffer which has an open high-severity CVE (Buffer Overflow
      # via toBigIntLE, GHSA-3gc7-fjrx-p6mg). There is no non-breaking fix
      # available upstream — npm audit fix --force would downgrade
      # @solana/spl-token to 0.1.8 which is incompatible with our code. The
      # CVE is widely known to the Solana community and our exposure is
      # limited to devnet until we deploy to mainnet, at which point we
      # revisit (tracked in docs/remediation-log.md as a follow-up).
      #
      # `|| true` keeps the audit output in logs for visibility without
      # blocking deploys. Flip off only if the ecosystem fixes bigint-buffer.
      - name: Audit dependencies (non-blocking, critical only)
        run: npm audit --audit-level=critical --omit=dev || true

      # Capture 7-char commit SHA so Sentry release tracking can attribute
      # every event to a specific deploy. `src/sentry.js` reads this as
      # `import.meta.env.VITE_GIT_SHA` and sets it as the Sentry `release`.
      - name: Capture commit SHA for Sentry release tag
        run: echo "VITE_GIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build
        run: npm run build
        env:
          VITE_API_PROXY_URL: ${{ secrets.VITE_API_PROXY_URL }}
          VITE_HELIUS_API_KEY: ${{ secrets.VITE_HELIUS_API_KEY }}
          VITE_SOLANA_RPC_URL: ${{ secrets.VITE_SOLANA_RPC_URL }}
          VITE_TTSE_PROXY_URL: ${{ secrets.VITE_TTSE_PROXY_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Sentry frontend DSN (audit C-02). Public-safe — ships in the
          # client bundle. If unset, initSentry() is a no-op and the app
          # builds cleanly with no telemetry.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_GIT_SHA: ${{ env.VITE_GIT_SHA }}

      # Project name corrected from `caribcryptomap` → `limerscapital` on
      # 2026-04-17. caribcryptomap is the legacy Direct-Upload Pages project
      # that was being retained during migration; `limerscapital` is the new
      # Git-connected project that serves limerscapital.pages.dev + will
      # serve limerscapital.com once the custom domain moves.
      #
      # NOTE: Cloudflare Pages Git CI also auto-deploys on every push to
      # the limerscapital project directly (no GH Actions intermediary).
      # This workflow therefore produces a redundant second deploy — kept
      # as a belt-and-suspenders backup in case the Git CI path fails. If
      # it becomes noisy, disable by commenting out the `on:` trigger or
      # deleting this file outright.
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name limerscapital
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
