# ── Limer's Capital — Cloudflare Workers ──
# Deploy individually:
#   cd workers
#   wrangler deploy ttse-proxy.js --name ttse-proxy
#   wrangler deploy api-proxy.js --name limer-api-proxy
#
# Set secrets for api-proxy:
#   wrangler secret put HELIUS_API_KEY --name limer-api-proxy

name = "ttse-proxy"
main = "ttse-proxy.js"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"
