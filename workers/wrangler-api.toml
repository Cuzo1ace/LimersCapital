# ── Limer's Capital — API Proxy Worker ──
# Deploy:
#   cd workers
#   wrangler deploy api-proxy.js -c wrangler-api.toml
#
# Set secrets (one-time):
#   wrangler secret put HELIUS_API_KEY -c wrangler-api.toml
#
# The HELIUS_API_KEY is NEVER exposed to the browser.
# All Helius calls route through this worker.

name = "limer-api-proxy"
main = "api-proxy.js"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"

# KV namespace for game state (LP, XP, quiz attempts, leaderboard)
[[kv_namespaces]]
binding = "GAME_STATE"
id = "c84ffd0d5d8c40fdaf2d9900619afdb6"
