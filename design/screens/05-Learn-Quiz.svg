<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844" style="background:#0d0e10">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;family=Inter:wght@400;500&amp;family=DM+Mono:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Screen background -->
  <rect width="390" height="844" fill="#0d0e10" rx="44"/>

  <!-- STATUS BAR -->
  <g id="status-bar">
    <rect x="0" y="0" width="390" height="44" fill="#0d0e10"/>
    <text x="28" y="28" font-family="Inter" font-weight="600" font-size="15" fill="#fdfbfe" letter-spacing="0.2">9:41</text>
    <g id="signal" transform="translate(311, 16)">
      <rect x="0" y="6" width="3" height="6" rx="1" fill="#fdfbfe"/>
      <rect x="5" y="4" width="3" height="8" rx="1" fill="#fdfbfe"/>
      <rect x="10" y="2" width="3" height="10" rx="1" fill="#fdfbfe"/>
      <rect x="15" y="0" width="3" height="12" rx="1" fill="#fdfbfe" opacity="0.35"/>
    </g>
    <g id="wifi" transform="translate(335, 18)">
      <path d="M8 10 C5.5 7.5 2.5 7.5 0 10" stroke="#fdfbfe" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.35"/>
      <path d="M10 7.5 C6.5 4 1.5 4 -2 7.5" stroke="#fdfbfe" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
      <path d="M12 5 C7.5 0.5 0.5 0.5 -4 5" stroke="#fdfbfe" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="4" cy="12" r="1.5" fill="#fdfbfe"/>
    </g>
    <g id="battery" transform="translate(354, 18)">
      <rect x="0" y="1" width="22" height="11" rx="3" stroke="#fdfbfe" stroke-width="1.2" fill="none"/>
      <rect x="22.5" y="4" width="2" height="5" rx="1" fill="#fdfbfe" opacity="0.5"/>
      <rect x="1.5" y="2.5" width="16" height="8" rx="2" fill="#fdfbfe"/>
    </g>
  </g>

  <!-- HEADER -->
  <g id="header">
    <rect x="0" y="44" width="390" height="56" fill="#0d0e10"/>
    <!-- Back arrow -->
    <g id="back-btn" transform="translate(16, 58)">
      <rect width="40" height="40" rx="8" fill="#1e2022"/>
      <path d="M24 20 L16 20 M16 20 L21 15 M16 20 L21 25" stroke="#fdfbfe" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <!-- Quiz title -->
    <text x="100" y="74" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="20" fill="#fdfbfe">Quiz</text>
    <!-- Question count right-aligned -->
    <text x="374" y="74" font-family="Inter" font-weight="500" font-size="13" fill="#ababad" text-anchor="end">Question 3 of 5</text>
  </g>

  <!-- PROGRESS DOTS -->
  <g id="progress-dots" transform="translate(195, 120)">
    <!-- Dot 1: filled -->
    <circle cx="-54" cy="0" r="6" fill="#00ffa3"/>
    <!-- Dot 2: filled -->
    <circle cx="-24" cy="0" r="6" fill="#00ffa3"/>
    <!-- Dot 3: current (larger) -->
    <circle cx="6" cy="0" r="9" fill="none" stroke="#00ffa3" stroke-width="2.5"/>
    <circle cx="6" cy="0" r="5" fill="#00ffa3"/>
    <!-- Dot 4: empty -->
    <circle cx="42" cy="0" r="6" fill="none" stroke="#47484a" stroke-width="2"/>
    <!-- Dot 5: empty -->
    <circle cx="72" cy="0" r="6" fill="none" stroke="#47484a" stroke-width="2"/>
  </g>

  <!-- QUESTION CARD -->
  <g id="question-card" transform="translate(16, 152)">
    <rect width="358" height="120" rx="16" fill="#121316"/>
    <!-- Question label -->
    <text x="20" y="30" font-family="Inter" font-weight="500" font-size="11" fill="#ababad" letter-spacing="0.8">QUESTION 3</text>
    <!-- Question text -->
    <text x="20" y="56" font-family="'Space Grotesk', sans-serif" font-weight="600" font-size="16" fill="#fdfbfe">Which consensus mechanism</text>
    <text x="20" y="78" font-family="'Space Grotesk', sans-serif" font-weight="600" font-size="16" fill="#fdfbfe">does Solana use?</text>
    <!-- Decorative element -->
    <rect x="20" y="100" width="40" height="3" rx="1.5" fill="#00ffa3" opacity="0.5"/>
  </g>

  <!-- ANSWER OPTIONS -->

  <!-- Option A: Proof of Work (default) -->
  <g id="option-a" transform="translate(16, 292)">
    <rect width="358" height="52" rx="8" fill="#1e2022"/>
    <!-- Option letter bubble -->
    <rect x="12" y="14" width="24" height="24" rx="6" fill="#0d0e10"/>
    <text x="24" y="31" font-family="Inter" font-weight="500" font-size="12" fill="#ababad" text-anchor="middle">A</text>
    <!-- Answer text -->
    <text x="50" y="31" font-family="Inter" font-size="14" fill="#fdfbfe">Proof of Work</text>
  </g>

  <!-- Option B: Proof of Stake (SELECTED — green border + tint) -->
  <g id="option-b-selected" transform="translate(16, 356)">
    <rect width="358" height="52" rx="8" fill="#00ffa308"/>
    <rect width="358" height="52" rx="8" fill="none" stroke="#00ffa3" stroke-width="2"/>
    <!-- Option letter bubble -->
    <rect x="12" y="14" width="24" height="24" rx="6" fill="#00ffa320"/>
    <text x="24" y="31" font-family="Inter" font-weight="600" font-size="12" fill="#00ffa3" text-anchor="middle">B</text>
    <!-- Check indicator -->
    <circle cx="330" cy="26" r="10" fill="#00ffa3"/>
    <path d="M324 26 L328 30 L336 22" stroke="#0d0e10" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Answer text -->
    <text x="50" y="31" font-family="Inter" font-weight="500" font-size="14" fill="#00ffa3">Proof of Stake</text>
  </g>

  <!-- Option C: Proof of History (default) -->
  <g id="option-c" transform="translate(16, 420)">
    <rect width="358" height="52" rx="8" fill="#1e2022"/>
    <rect x="12" y="14" width="24" height="24" rx="6" fill="#0d0e10"/>
    <text x="24" y="31" font-family="Inter" font-weight="500" font-size="12" fill="#ababad" text-anchor="middle">C</text>
    <text x="50" y="31" font-family="Inter" font-size="14" fill="#fdfbfe">Proof of History</text>
  </g>

  <!-- Option D: Delegated Proof of Stake (default) -->
  <g id="option-d" transform="translate(16, 484)">
    <rect width="358" height="52" rx="8" fill="#1e2022"/>
    <rect x="12" y="14" width="24" height="24" rx="6" fill="#0d0e10"/>
    <text x="24" y="31" font-family="Inter" font-weight="500" font-size="12" fill="#ababad" text-anchor="middle">D</text>
    <text x="50" y="31" font-family="Inter" font-size="14" fill="#fdfbfe">Delegated Proof of Stake</text>
  </g>

  <!-- SWIPE INDICATOR -->
  <g id="swipe-indicator" transform="translate(195, 700)">
    <!-- Swipe handle line -->
    <rect x="-30" y="-2" width="60" height="4" rx="2" fill="#47484a"/>
    <!-- Swipe arrows -->
    <path d="-48 8 L-40 8 M-44 4 L-40 8 L-44 12" stroke="#ababad" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    <path d="M48 8 L40 8 M44 4 L40 8 L44 12" stroke="#ababad" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    <!-- Label -->
    <text x="0" y="30" font-family="Inter" font-size="12" fill="#ababad" text-anchor="middle">Swipe to continue</text>
    <!-- Left arrow group -->
    <g transform="translate(-80, 2)">
      <path d="M8 6 L0 6 M4 2 L0 6 L4 10" stroke="#ababad" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </g>
    <!-- Right arrow group -->
    <g transform="translate(72, 2)">
      <path d="M0 6 L8 6 M4 2 L8 6 L4 10" stroke="#ababad" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </g>
  </g>

  <!-- Hint text -->
  <text x="195" y="740" font-family="Inter" font-size="11" fill="#47484a" text-anchor="middle">Select an answer above to continue</text>

  <!-- BOTTOM NAV -->
  <g id="bottom-nav">
    <rect x="0" y="788" width="390" height="56" fill="#121316"/>
    <line x1="0" y1="788" x2="390" y2="788" stroke="#47484a66" stroke-width="1"/>
    <g id="nav-home" transform="translate(15, 796)">
      <path d="M37 22 L37 14 L44 8 L51 14 L51 22 Z" stroke="#ababad" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
      <rect x="40" y="16" width="8" height="6" rx="1" fill="none" stroke="#ababad" stroke-width="1.5"/>
      <text x="44" y="38" font-family="Inter" font-size="10" fill="#ababad" text-anchor="middle">Home</text>
    </g>
    <g id="nav-map" transform="translate(93, 796)">
      <path d="M37 22 C37 16 44 8 44 8 C44 8 51 16 51 22 C51 26 44 28 44 22 Z" stroke="#ababad" stroke-width="1.5" fill="none"/>
      <circle cx="44" cy="18" r="2.5" stroke="#ababad" stroke-width="1.3" fill="none"/>
      <text x="44" y="38" font-family="Inter" font-size="10" fill="#ababad" text-anchor="middle">Map</text>
    </g>
    <g id="nav-learn-active" transform="translate(171, 796)">
      <rect x="28" y="4" width="32" height="24" rx="4" fill="none" stroke="#00ffa3" stroke-width="1.5"/>
      <line x1="34" y1="10" x2="54" y2="10" stroke="#00ffa3" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="34" y1="15" x2="54" y2="15" stroke="#00ffa3" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="34" y1="20" x2="46" y2="20" stroke="#00ffa3" stroke-width="1.5" stroke-linecap="round"/>
      <text x="44" y="38" font-family="Inter" font-weight="500" font-size="10" fill="#00ffa3" text-anchor="middle">Learn</text>
    </g>
    <g id="nav-portfolio" transform="translate(249, 796)">
      <circle cx="44" cy="14" r="8" stroke="#ababad" stroke-width="1.5" fill="none"/>
      <path d="M44 14 L44 8 A8 8 0 0 1 51 18 Z" fill="#ababad" opacity="0.5"/>
      <text x="44" y="38" font-family="Inter" font-size="10" fill="#ababad" text-anchor="middle">Portfolio</text>
    </g>
    <g id="nav-profile" transform="translate(327, 796)">
      <circle cx="44" cy="12" r="5" stroke="#ababad" stroke-width="1.5" fill="none"/>
      <path d="M36 26 C36 20 52 20 52 26" stroke="#ababad" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <text x="44" y="38" font-family="Inter" font-size="10" fill="#ababad" text-anchor="middle">Profile</text>
    </g>
    <rect x="155" y="836" width="80" height="4" rx="2" fill="#fdfbfe" opacity="0.2"/>
  </g>
</svg>
