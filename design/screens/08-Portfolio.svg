<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="pieGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ffa3"/>
      <stop offset="100%" stop-color="#00ef99"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#0d0e10"/>

  <!-- Status Bar -->
  <g id="status-bar">
    <text x="32" y="20" font-family="Inter" font-weight="600" font-size="14" fill="#fdfbfe">9:41</text>
    <g transform="translate(310,8)">
      <rect x="0" y="8" width="3" height="4" rx="0.5" fill="#fdfbfe"/>
      <rect x="5" y="5" width="3" height="7" rx="0.5" fill="#fdfbfe"/>
      <rect x="10" y="2" width="3" height="10" rx="0.5" fill="#fdfbfe"/>
      <rect x="15" y="0" width="3" height="12" rx="0.5" fill="#fdfbfe"/>
    </g>
    <g transform="translate(358,8)">
      <rect x="0" y="1" width="22" height="10" rx="2" stroke="#fdfbfe" stroke-width="1" fill="none"/>
      <rect x="2" y="3" width="16" height="6" rx="1" fill="#00ffa3"/>
    </g>
  </g>

  <!-- Header -->
  <g id="header">
    <text x="16" y="68" font-family="Space Grotesk" font-weight="700" font-size="20" fill="#fdfbfe">Portfolio</text>
    <text x="374" y="68" font-family="Inter" font-size="12" fill="#ababad" text-anchor="end">Export</text>
  </g>

  <!-- Total Value -->
  <g id="total-value">
    <text x="16" y="108" font-family="Inter" font-size="12" fill="#ababad">Total Balance</text>
    <text x="16" y="148" font-family="DM Mono" font-size="36" fill="#fdfbfe">$4,821.50</text>
    <!-- PnL Badge -->
    <rect x="16" y="160" width="100" height="28" rx="14" fill="#00ffa3" opacity="0.12"/>
    <text x="28" y="179" font-family="DM Mono" font-size="13" fill="#00ffa3">+$342.18</text>
    <rect x="124" y="160" width="72" height="28" rx="14" fill="#00ffa3" opacity="0.12"/>
    <text x="136" y="179" font-family="DM Mono" font-size="13" fill="#00ffa3">+7.6%</text>
    <text x="206" y="179" font-family="Inter" font-size="11" fill="#ababad">24h</text>
  </g>

  <!-- Allocation Pie Chart -->
  <g id="allocation-chart" transform="translate(195,260)">
    <!-- Pie chart (simplified wedges) -->
    <circle cx="0" cy="0" r="60" fill="#121316"/>
    <!-- SOL slice ~45% -->
    <path d="M0,-60 A60,60 0 0,1 52,30 L0,0 Z" fill="#9945FF" opacity="0.8"/>
    <!-- BTC slice ~25% -->
    <path d="M52,30 A60,60 0 0,1 -30,52 L0,0 Z" fill="#F7931A" opacity="0.8"/>
    <!-- USDC slice ~15% -->
    <path d="M-30,52 A60,60 0 0,1 -58,-14 L0,0 Z" fill="#2775CA" opacity="0.8"/>
    <!-- LIMER slice ~10% -->
    <path d="M-58,-14 A60,60 0 0,1 -20,-56 L0,0 Z" fill="#00ffa3" opacity="0.8"/>
    <!-- ETH slice ~5% -->
    <path d="M-20,-56 A60,60 0 0,1 0,-60 L0,0 Z" fill="#627EEA" opacity="0.8"/>
    <!-- Center hole -->
    <circle cx="0" cy="0" r="36" fill="#0d0e10"/>
    <text x="0" y="-4" font-family="DM Mono" font-size="14" fill="#fdfbfe" text-anchor="middle">5</text>
    <text x="0" y="12" font-family="Inter" font-size="10" fill="#ababad" text-anchor="middle">tokens</text>
  </g>

  <!-- Legend -->
  <g id="legend" transform="translate(16,340)">
    <circle cx="8" cy="6" r="4" fill="#9945FF"/><text x="18" y="10" font-family="Inter" font-size="11" fill="#ababad">SOL 45%</text>
    <circle cx="80" cy="6" r="4" fill="#F7931A"/><text x="90" y="10" font-family="Inter" font-size="11" fill="#ababad">BTC 25%</text>
    <circle cx="156" cy="6" r="4" fill="#2775CA"/><text x="166" y="10" font-family="Inter" font-size="11" fill="#ababad">USDC 15%</text>
    <circle cx="240" cy="6" r="4" fill="#00ffa3"/><text x="250" y="10" font-family="Inter" font-size="11" fill="#ababad">LIMER 10%</text>
    <circle cx="326" cy="6" r="4" fill="#627EEA"/><text x="336" y="10" font-family="Inter" font-size="11" fill="#ababad">ETH 5%</text>
  </g>

  <!-- Holdings List -->
  <g id="holdings">
    <text x="16" y="384" font-family="Space Grotesk" font-weight="600" font-size="16" fill="#fdfbfe">Holdings</text>

    <!-- SOL -->
    <g transform="translate(0,396)">
      <rect x="16" y="0" width="358" height="56" rx="12" fill="#121316"/>
      <circle cx="44" cy="28" r="16" fill="#9945FF" opacity="0.2"/>
      <text x="44" y="33" font-family="Inter" font-weight="700" font-size="12" fill="#9945FF" text-anchor="middle">S</text>
      <text x="68" y="22" font-family="Inter" font-weight="500" font-size="14" fill="#fdfbfe">Solana</text>
      <text x="68" y="38" font-family="DM Mono" font-size="11" fill="#ababad">14.62 SOL</text>
      <text x="358" y="22" font-family="DM Mono" font-size="13" fill="#fdfbfe" text-anchor="end">$2,169.68</text>
      <text x="358" y="38" font-family="DM Mono" font-size="11" fill="#00ffa3" text-anchor="end">+5.2%</text>
    </g>

    <!-- BTC -->
    <g transform="translate(0,460)">
      <rect x="16" y="0" width="358" height="56" rx="12" fill="#121316"/>
      <circle cx="44" cy="28" r="16" fill="#F7931A" opacity="0.2"/>
      <text x="44" y="33" font-family="Inter" font-weight="700" font-size="12" fill="#F7931A" text-anchor="middle">B</text>
      <text x="68" y="22" font-family="Inter" font-weight="500" font-size="14" fill="#fdfbfe">Bitcoin</text>
      <text x="68" y="38" font-family="DM Mono" font-size="11" fill="#ababad">0.0179 BTC</text>
      <text x="358" y="22" font-family="DM Mono" font-size="13" fill="#fdfbfe" text-anchor="end">$1,206.83</text>
      <text x="358" y="38" font-family="DM Mono" font-size="11" fill="#00ffa3" text-anchor="end">+1.8%</text>
    </g>

    <!-- USDC -->
    <g transform="translate(0,524)">
      <rect x="16" y="0" width="358" height="56" rx="12" fill="#121316"/>
      <circle cx="44" cy="28" r="16" fill="#2775CA" opacity="0.2"/>
      <text x="44" y="33" font-family="Inter" font-weight="700" font-size="12" fill="#2775CA" text-anchor="middle">U</text>
      <text x="68" y="22" font-family="Inter" font-weight="500" font-size="14" fill="#fdfbfe">USD Coin</text>
      <text x="68" y="38" font-family="DM Mono" font-size="11" fill="#ababad">723.22 USDC</text>
      <text x="358" y="22" font-family="DM Mono" font-size="13" fill="#fdfbfe" text-anchor="end">$723.22</text>
      <text x="358" y="38" font-family="DM Mono" font-size="11" fill="#ababad" text-anchor="end">0.0%</text>
    </g>

    <!-- LIMER -->
    <g transform="translate(0,588)">
      <rect x="16" y="0" width="358" height="56" rx="12" fill="#121316"/>
      <circle cx="44" cy="28" r="16" fill="#00ffa3" opacity="0.2"/>
      <text x="44" y="33" font-family="Inter" font-weight="700" font-size="11" fill="#00ffa3" text-anchor="middle">$L</text>
      <text x="68" y="22" font-family="Inter" font-weight="500" font-size="14" fill="#fdfbfe">$LIMER</text>
      <text x="68" y="38" font-family="DM Mono" font-size="11" fill="#ababad">11,470 LIMER</text>
      <text x="358" y="22" font-family="DM Mono" font-size="13" fill="#fdfbfe" text-anchor="end">$481.74</text>
      <text x="358" y="38" font-family="DM Mono" font-size="11" fill="#00ffa3" text-anchor="end">+12.4%</text>
    </g>
  </g>

  <!-- Transaction History -->
  <g id="transactions">
    <text x="16" y="680" font-family="Space Grotesk" font-weight="600" font-size="16" fill="#fdfbfe">Recent Transactions</text>
    <text x="16" y="700" font-family="Inter" font-size="11" fill="#ababad">Today</text>

    <g transform="translate(0,710)">
      <rect x="16" y="0" width="358" height="48" rx="8" fill="#121316"/>
      <text x="32" y="18" font-family="Inter" font-weight="500" font-size="13" fill="#00ffa3">Bought SOL</text>
      <text x="32" y="34" font-family="Inter" font-size="11" fill="#ababad">2.5 SOL @ $147.80</text>
      <text x="358" y="18" font-family="DM Mono" font-size="12" fill="#fdfbfe" text-anchor="end">$369.50</text>
      <text x="358" y="34" font-family="Inter" font-size="11" fill="#ababad" text-anchor="end">14:32</text>
    </g>

    <g transform="translate(0,766)">
      <rect x="16" y="0" width="358" height="48" rx="8" fill="#121316"/>
      <text x="32" y="18" font-family="Inter" font-weight="500" font-size="13" fill="#bf81ff">Earned LP</text>
      <text x="32" y="34" font-family="Inter" font-size="11" fill="#ababad">Quiz completion bonus</text>
      <text x="358" y="18" font-family="DM Mono" font-size="12" fill="#bf81ff" text-anchor="end">+25 LP</text>
      <text x="358" y="34" font-family="Inter" font-size="11" fill="#ababad" text-anchor="end">12:15</text>
    </g>
  </g>

  <!-- Bottom Nav -->
  <g id="bottom-nav">
    <rect x="0" y="788" width="390" height="56" fill="#121316"/>
    <line x1="0" y1="788" x2="390" y2="788" stroke="#47484a66" stroke-width="1"/>
    <!-- Home -->
    <g transform="translate(23,798)">
      <rect x="14" y="2" width="20" height="16" rx="3" stroke="#ababad" stroke-width="1.5" fill="none"/>
      <text x="24" y="34" font-family="Inter" font-size="10" fill="#ababad" text-anchor="middle">Home</text>
    </g>
    <!-- Learn -->
    <g transform="translate(101,798)">
      <rect x="14" y="2" width="20" height="16" rx="3" stroke="#ababad" stroke-width="1.5" fill="none"/>
      <text x="24" y="34" font-family="Inter" font-size="10" fill="#ababad" text-anchor="middle">Learn</text>
    </g>
    <!-- Market -->
    <g transform="translate(179,798)">
      <polyline points="14,18 19,8 24,14 29,4 34,12" stroke="#ababad" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <text x="24" y="34" font-family="Inter" font-size="10" fill="#ababad" text-anchor="middle">Market</text>
    </g>
    <!-- Trade -->
    <g transform="translate(257,798)">
      <path d="M14,14 L24,4 L34,14 M14,18 L34,18" stroke="#ababad" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <text x="24" y="34" font-family="Inter" font-size="10" fill="#ababad" text-anchor="middle">Trade</text>
    </g>
    <!-- Portfolio (active) -->
    <g transform="translate(335,798)">
      <circle cx="24" cy="10" r="8" fill="#00ffa3" opacity="0.2"/>
      <circle cx="24" cy="10" r="8" stroke="#00ffa3" stroke-width="1.5" fill="none"/>
      <text x="24" y="34" font-family="Inter" font-weight="600" font-size="10" fill="#00ffa3" text-anchor="middle">Portfolio</text>
    </g>
  </g>
</svg>