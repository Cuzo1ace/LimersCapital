<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;family=Inter:wght@400;500&amp;family=DM+Mono:wght@400&amp;display=swap');
    </style>
    <!-- Gradient for chart area depth -->
    <linearGradient id="chart-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121316"/>
      <stop offset="100%" stop-color="#0d0e10"/>
    </linearGradient>
    <!-- Green candle gradient -->
    <linearGradient id="area-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffa3" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ffa3" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#0d0e10"/>

  <!-- ====== STATUS BAR ====== -->
  <g id="status-bar">
    <text x="16" y="22" font-family="Inter, sans-serif" font-weight="600" font-size="15" fill="#fdfbfe">9:41</text>
    <!-- Signal bars -->
    <g id="signal" transform="translate(312, 10)">
      <rect x="0" y="6" width="3" height="6" rx="1" fill="#fdfbfe"/>
      <rect x="5" y="4" width="3" height="8" rx="1" fill="#fdfbfe"/>
      <rect x="10" y="2" width="3" height="10" rx="1" fill="#fdfbfe"/>
      <rect x="15" y="0" width="3" height="12" rx="1" fill="#fdfbfe" opacity="0.4"/>
    </g>
    <!-- Wifi -->
    <g id="wifi" transform="translate(336, 10)">
      <path d="M8,10 Q8,6 12,4 Q16,6 16,10" stroke="#fdfbfe" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M5,8 Q5,2 12,0 Q19,2 19,8" stroke="#fdfbfe" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      <circle cx="12" cy="12" r="1.5" fill="#fdfbfe"/>
    </g>
    <!-- Battery -->
    <g id="battery" transform="translate(358, 11)">
      <rect x="0" y="0" width="22" height="11" rx="2.5" stroke="#fdfbfe" stroke-width="1.2" fill="none"/>
      <rect x="22.5" y="3" width="2" height="5" rx="1" fill="#fdfbfe" opacity="0.5"/>
      <rect x="1.5" y="1.5" width="16" height="8" rx="1.5" fill="#fdfbfe"/>
    </g>
  </g>

  <!-- ====== HEADER ====== -->
  <g id="header">
    <!-- Back arrow -->
    <g id="back-btn" transform="translate(8, 36)">
      <rect width="40" height="40" rx="20" fill="transparent"/>
      <path d="M24,20 L16,12 M16,12 L24,4" stroke="#fdfbfe" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(0,8)"/>
    </g>

    <!-- Token selector pill -->
    <g id="token-selector">
      <rect x="54" y="40" width="238" height="40" rx="24" fill="#1e2022"/>
      <!-- SOL icon circle -->
      <circle cx="78" cy="60" r="14" fill="#9945FF" fill-opacity="0.2"/>
      <text x="78" y="65" font-family="Inter, sans-serif" font-weight="700" font-size="12" fill="#9945FF" text-anchor="middle">S</text>
      <!-- Pair text -->
      <text x="100" y="63" font-family="Inter, sans-serif" font-weight="500" font-size="15" fill="#fdfbfe">SOL / USDC</text>
      <!-- Dropdown chevron -->
      <path d="M268,56 L274,62 L280,56" stroke="#ababad" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Settings gear icon -->
    <g id="settings-gear" transform="translate(304, 40)">
      <rect width="44" height="40" rx="0" fill="transparent"/>
      <circle cx="22" cy="20" r="6" stroke="#fdfbfe" stroke-width="1.5" fill="none"/>
      <circle cx="22" cy="20" r="2.5" fill="#fdfbfe"/>
      <path d="M22,11 L22,13 M22,27 L22,29 M13,20 L15,20 M29,20 L31,20 M15.64,13.64 L17.05,15.05 M26.95,24.95 L28.36,26.36 M15.64,26.36 L17.05,24.95 M26.95,15.05 L28.36,13.64" stroke="#fdfbfe" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ====== CHART AREA ====== -->
  <g id="chart-area">
    <rect x="0" y="88" width="390" height="390" fill="url(#chart-bg-grad)"/>

    <!-- Horizontal grid lines -->
    <line x1="48" y1="110" x2="365" y2="110" stroke="#47484a66" stroke-width="1"/>
    <line x1="48" y1="160" x2="365" y2="160" stroke="#47484a66" stroke-width="1"/>
    <line x1="48" y1="210" x2="365" y2="210" stroke="#47484a66" stroke-width="1"/>
    <line x1="48" y1="260" x2="365" y2="260" stroke="#47484a66" stroke-width="1"/>
    <line x1="48" y1="310" x2="365" y2="310" stroke="#47484a66" stroke-width="1"/>
    <line x1="48" y1="360" x2="365" y2="360" stroke="#47484a66" stroke-width="1"/>
    <line x1="48" y1="430" x2="365" y2="430" stroke="#47484a66" stroke-width="1"/>

    <!-- Price labels on Y axis -->
    <text x="40" y="113" font-family="'DM Mono', monospace" font-size="9" fill="#ababad" text-anchor="end">155</text>
    <text x="40" y="163" font-family="'DM Mono', monospace" font-size="9" fill="#ababad" text-anchor="end">152</text>
    <text x="40" y="213" font-family="'DM Mono', monospace" font-size="9" fill="#ababad" text-anchor="end">150</text>
    <text x="40" y="263" font-family="'DM Mono', monospace" font-size="9" fill="#ababad" text-anchor="end">148</text>
    <text x="40" y="313" font-family="'DM Mono', monospace" font-size="9" fill="#ababad" text-anchor="end">146</text>
    <text x="40" y="363" font-family="'DM Mono', monospace" font-size="9" fill="#ababad" text-anchor="end">144</text>

    <!-- Timeframe pills row -->
    <g id="timeframe-pills" transform="translate(48, 92)">
      <!-- 1H -->
      <rect x="0" y="0" width="34" height="24" rx="6" fill="none"/>
      <text x="17" y="16" font-family="Inter, sans-serif" font-weight="500" font-size="12" fill="#ababad" text-anchor="middle">1H</text>
      <!-- 4H -->
      <rect x="38" y="0" width="34" height="24" rx="6" fill="none"/>
      <text x="55" y="16" font-family="Inter, sans-serif" font-weight="500" font-size="12" fill="#ababad" text-anchor="middle">4H</text>
      <!-- 1D (ACTIVE) -->
      <rect x="76" y="0" width="34" height="24" rx="6" fill="#00ffa3" fill-opacity="0.12"/>
      <text x="93" y="16" font-family="Inter, sans-serif" font-weight="500" font-size="12" fill="#00ffa3" text-anchor="middle">1D</text>
      <!-- 1W -->
      <rect x="114" y="0" width="34" height="24" rx="6" fill="none"/>
      <text x="131" y="16" font-family="Inter, sans-serif" font-weight="500" font-size="12" fill="#ababad" text-anchor="middle">1W</text>
      <!-- 1M -->
      <rect x="152" y="0" width="34" height="24" rx="6" fill="none"/>
      <text x="169" y="16" font-family="Inter, sans-serif" font-weight="500" font-size="12" fill="#ababad" text-anchor="middle">1M</text>
    </g>

    <!-- ====== CANDLESTICK CHART ====== -->
    <!-- Each candle: wick (line) + body (rect). x positions spread 48..360, 15 candles -->
    <!-- Candle width=12, gap=8, step=20. Starting x=50 -->
    <!-- Green=up #00ffa3, Red=down #ff716c -->
    <!-- Candle heights vary to suggest a rising then dipping market -->

    <!-- Candle 1 (green) x=52 -->
    <g id="candle-1">
      <line x1="58" y1="340" x2="58" y2="370" stroke="#00ffa3" stroke-width="1"/>
      <rect x="52" y="345" width="12" height="20" rx="1" fill="#00ffa3"/>
    </g>
    <!-- Candle 2 (green) x=72 -->
    <g id="candle-2">
      <line x1="78" y1="325" x2="78" y2="360" stroke="#00ffa3" stroke-width="1"/>
      <rect x="72" y="330" width="12" height="22" rx="1" fill="#00ffa3"/>
    </g>
    <!-- Candle 3 (red) x=92 -->
    <g id="candle-3">
      <line x1="98" y1="330" x2="98" y2="358" stroke="#ff716c" stroke-width="1"/>
      <rect x="92" y="336" width="12" height="18" rx="1" fill="#ff716c"/>
    </g>
    <!-- Candle 4 (green) x=112 -->
    <g id="candle-4">
      <line x1="118" y1="310" x2="118" y2="350" stroke="#00ffa3" stroke-width="1"/>
      <rect x="112" y="316" width="12" height="28" rx="1" fill="#00ffa3"/>
    </g>
    <!-- Candle 5 (green) x=132 -->
    <g id="candle-5">
      <line x1="138" y1="296" x2="138" y2="338" stroke="#00ffa3" stroke-width="1"/>
      <rect x="132" y="300" width="12" height="30" rx="1" fill="#00ffa3"/>
    </g>
    <!-- Candle 6 (red) x=152 -->
    <g id="candle-6">
      <line x1="158" y1="292" x2="158" y2="332" stroke="#ff716c" stroke-width="1"/>
      <rect x="152" y="296" width="12" height="26" rx="1" fill="#ff716c"/>
    </g>
    <!-- Candle 7 (green) x=172 -->
    <g id="candle-7">
      <line x1="178" y1="274" x2="178" y2="316" stroke="#00ffa3" stroke-width="1"/>
      <rect x="172" y="278" width="12" height="30" rx="1" fill="#00ffa3"/>
    </g>
    <!-- Candle 8 (green) x=192 -->
    <g id="candle-8">
      <line x1="198" y1="260" x2="198" y2="308" stroke="#00ffa3" stroke-width="1"/>
      <rect x="192" y="264" width="12" height="36" rx="1" fill="#00ffa3"/>
    </g>
    <!-- Candle 9 (red) x=212 -->
    <g id="candle-9">
      <line x1="218" y1="256" x2="218" y2="302" stroke="#ff716c" stroke-width="1"/>
      <rect x="212" y="260" width="12" height="28" rx="1" fill="#ff716c"/>
    </g>
    <!-- Candle 10 (green) x=232 -->
    <g id="candle-10">
      <line x1="238" y1="238" x2="238" y2="284" stroke="#00ffa3" stroke-width="1"/>
      <rect x="232" y="242" width="12" height="34" rx="1" fill="#00ffa3"/>
    </g>
    <!-- Candle 11 (red) x=252 -->
    <g id="candle-11">
      <line x1="258" y1="234" x2="258" y2="278" stroke="#ff716c" stroke-width="1"/>
      <rect x="252" y="238" width="12" height="30" rx="1" fill="#ff716c"/>
    </g>
    <!-- Candle 12 (green) x=272 -->
    <g id="candle-12">
      <line x1="278" y1="218" x2="278" y2="268" stroke="#00ffa3" stroke-width="1"/>
      <rect x="272" y="222" width="12" height="36" rx="1" fill="#00ffa3"/>
    </g>
    <!-- Candle 13 (green) x=292 -->
    <g id="candle-13">
      <line x1="298" y1="208" x2="298" y2="262" stroke="#00ffa3" stroke-width="1"/>
      <rect x="292" y="212" width="12" height="40" rx="1" fill="#00ffa3"/>
    </g>
    <!-- Candle 14 (red) x=312 -->
    <g id="candle-14">
      <line x1="318" y1="210" x2="318" y2="260" stroke="#ff716c" stroke-width="1"/>
      <rect x="312" y="218" width="12" height="32" rx="1" fill="#ff716c"/>
    </g>
    <!-- Candle 15 (green) x=332 — current/last candle, slightly highlighted -->
    <g id="candle-15-current">
      <line x1="338" y1="200" x2="338" y2="256" stroke="#00ffa3" stroke-width="1"/>
      <rect x="332" y="204" width="12" height="42" rx="1" fill="#00ffa3"/>
    </g>

    <!-- Current price crosshair line -->
    <line x1="48" y1="258" x2="338" y2="258" stroke="#00ffa3" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>

    <!-- Price label bubble -->
    <rect x="340" y="249" width="46" height="18" rx="4" fill="#00ffa3"/>
    <text x="363" y="262" font-family="'DM Mono', monospace" font-weight="400" font-size="10" fill="#0d0e10" text-anchor="middle">148.32</text>

    <!-- Time axis labels -->
    <text x="70" y="480" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#ababad">12:00</text>
    <text x="143" y="480" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#ababad">14:00</text>
    <text x="213" y="480" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#ababad">16:00</text>
    <text x="283" y="480" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#ababad">18:00</text>
    <text x="338" y="480" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#ababad">20:00</text>

    <!-- Volume bars at chart bottom -->
    <g id="volume-bars" opacity="0.35">
      <rect x="52" y="450" width="12" height="14" rx="1" fill="#00ffa3"/>
      <rect x="72" y="446" width="12" height="18" rx="1" fill="#00ffa3"/>
      <rect x="92" y="452" width="12" height="12" rx="1" fill="#ff716c"/>
      <rect x="112" y="444" width="12" height="20" rx="1" fill="#00ffa3"/>
      <rect x="132" y="440" width="12" height="24" rx="1" fill="#00ffa3"/>
      <rect x="152" y="448" width="12" height="16" rx="1" fill="#ff716c"/>
      <rect x="172" y="442" width="12" height="22" rx="1" fill="#00ffa3"/>
      <rect x="192" y="436" width="12" height="28" rx="1" fill="#00ffa3"/>
      <rect x="212" y="445" width="12" height="19" rx="1" fill="#ff716c"/>
      <rect x="232" y="432" width="12" height="32" rx="1" fill="#00ffa3"/>
      <rect x="252" y="446" width="12" height="18" rx="1" fill="#ff716c"/>
      <rect x="272" y="430" width="12" height="34" rx="1" fill="#00ffa3"/>
      <rect x="292" y="428" width="12" height="36" rx="1" fill="#00ffa3"/>
      <rect x="312" y="443" width="12" height="21" rx="1" fill="#ff716c"/>
      <rect x="332" y="425" width="12" height="39" rx="1" fill="#00ffa3"/>
    </g>
  </g>

  <!-- ====== ORDER FORM ====== -->
  <g id="order-form">
    <!-- Form container bg -->
    <rect x="0" y="490" width="390" height="298" fill="#0d0e10"/>
    <!-- Top border separator -->
    <line x1="0" y1="490" x2="390" y2="490" stroke="#47484a66" stroke-width="1"/>

    <!-- Buy / Sell Toggle -->
    <g id="buy-sell-toggle">
      <rect x="16" y="502" width="358" height="44" rx="8" fill="#121316"/>
      <!-- Buy (active) -->
      <rect x="20" y="506" width="173" height="36" rx="6" fill="#00ffa3"/>
      <text x="106.5" y="529" font-family="'Space Grotesk', sans-serif" font-weight="600" font-size="15" fill="#0d0e10" text-anchor="middle">Buy</text>
      <!-- Sell (inactive) -->
      <text x="289.5" y="529" font-family="'Space Grotesk', sans-serif" font-weight="600" font-size="15" fill="#ababad" text-anchor="middle">Sell</text>
    </g>

    <!-- Amount input -->
    <g id="amount-input">
      <text x="16" y="567" font-family="Inter, sans-serif" font-weight="500" font-size="12" fill="#ababad">Amount</text>
      <rect x="16" y="574" width="358" height="48" rx="8" fill="#1e2022"/>
      <!-- Placeholder -->
      <text x="28" y="603" font-family="'DM Mono', monospace" font-weight="400" font-size="18" fill="#47484a">0.00</text>
      <!-- SOL suffix -->
      <rect x="318" y="586" width="44" height="24" rx="6" fill="#0d0e10"/>
      <text x="340" y="603" font-family="Inter, sans-serif" font-weight="500" font-size="13" fill="#fdfbfe" text-anchor="middle">SOL</text>
    </g>

    <!-- Percentage quick-select -->
    <g id="pct-selector">
      <!-- Track -->
      <rect x="16" y="638" width="358" height="4" rx="2" fill="#1e2022"/>
      <!-- Filled portion (50%) -->
      <rect x="16" y="638" width="179" height="4" rx="2" fill="#00ffa3" opacity="0.5"/>
      <!-- Thumb at 50% -->
      <circle cx="195" cy="640" r="8" fill="#00ffa3" stroke="#0d0e10" stroke-width="2"/>
      <!-- Labels -->
      <text x="16" y="660" font-family="Inter, sans-serif" font-weight="400" font-size="11" fill="#ababad">25%</text>
      <text x="105" y="660" font-family="Inter, sans-serif" font-weight="400" font-size="11" fill="#ababad" text-anchor="middle">50%</text>
      <text x="265" y="660" font-family="Inter, sans-serif" font-weight="400" font-size="11" fill="#ababad" text-anchor="middle">75%</text>
      <text x="374" y="660" font-family="Inter, sans-serif" font-weight="400" font-size="11" fill="#ababad" text-anchor="end">100%</text>
    </g>

    <!-- Total row -->
    <g id="total-row">
      <line x1="16" y1="674" x2="374" y2="674" stroke="#47484a66" stroke-width="1"/>
      <text x="16" y="694" font-family="Inter, sans-serif" font-weight="400" font-size="14" fill="#ababad">Total</text>
      <text x="374" y="694" font-family="'DM Mono', monospace" font-weight="400" font-size="14" fill="#fdfbfe" text-anchor="end">0.00 USDC</text>
    </g>

    <!-- Submit button -->
    <g id="submit-btn">
      <rect x="16" y="706" width="358" height="48" rx="12" fill="#00ffa3"/>
      <text x="195" y="735" font-family="'Space Grotesk', sans-serif" font-weight="600" font-size="16" fill="#0d0e10" text-anchor="middle">Buy SOL</text>
    </g>
  </g>

  <!-- ====== BOTTOM NAV ====== -->
  <g id="bottom-nav">
    <rect x="0" y="788" width="390" height="56" fill="#121316"/>
    <line x1="0" y1="788" x2="390" y2="788" stroke="#47484a66" stroke-width="1"/>

    <!-- Home tab -->
    <g id="nav-home" transform="translate(19, 800)">
      <path d="M39,20 L39,10 L46,4 L53,10 L53,20" stroke="#ababad" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
      <rect x="42" y="14" width="8" height="6" rx="1" stroke="#ababad" stroke-width="1.5" fill="none"/>
      <text x="46" y="36" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#ababad" text-anchor="middle">Home</text>
    </g>

    <!-- Market tab -->
    <g id="nav-market" transform="translate(97, 800)">
      <rect x="34" y="4" width="16" height="16" rx="2" stroke="#ababad" stroke-width="1.5" fill="none"/>
      <line x1="38" y1="8" x2="46" y2="8" stroke="#ababad" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="38" y1="12" x2="46" y2="12" stroke="#ababad" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="38" y1="16" x2="42" y2="16" stroke="#ababad" stroke-width="1.5" stroke-linecap="round"/>
      <text x="42" y="36" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#ababad" text-anchor="middle">Market</text>
    </g>

    <!-- Trade tab (ACTIVE) -->
    <g id="nav-trade" transform="translate(175, 800)">
      <path d="M38,20 L38,10" stroke="#00ffa3" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M46,20 L46,6" stroke="#00ffa3" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M54,20 L54,14" stroke="#00ffa3" stroke-width="1.5" stroke-linecap="round"/>
      <text x="46" y="36" font-family="Inter, sans-serif" font-weight="500" font-size="10" fill="#00ffa3" text-anchor="middle">Trade</text>
    </g>

    <!-- Portfolio tab -->
    <g id="nav-portfolio" transform="translate(253, 800)">
      <circle cx="46" cy="12" r="8" stroke="#ababad" stroke-width="1.5" fill="none"/>
      <path d="M38,12 L54,12" stroke="#ababad" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M46,4 L46,20" stroke="#ababad" stroke-width="1.5" stroke-linecap="round"/>
      <text x="46" y="36" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#ababad" text-anchor="middle">Portfolio</text>
    </g>

    <!-- Profile tab -->
    <g id="nav-profile" transform="translate(315, 800)">
      <circle cx="46" cy="9" r="5" stroke="#ababad" stroke-width="1.5" fill="none"/>
      <path d="M36,22 Q36,16 46,16 Q56,16 56,22" stroke="#ababad" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <text x="46" y="36" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#ababad" text-anchor="middle">Profile</text>
    </g>

    <!-- Active indicator dot for Trade tab -->
    <circle cx="253" cy="789" r="2" fill="#00ffa3"/>
  </g>

  <!-- Home indicator bar -->
  <rect x="138" y="828" width="114" height="5" rx="2.5" fill="#fdfbfe" opacity="0.3"/>

</svg>
