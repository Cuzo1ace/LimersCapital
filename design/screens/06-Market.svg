<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;family=Inter:wght@400;500&amp;family=DM+Mono:wght@400&amp;display=swap');
    </style>
    <clipPath id="screen-clip">
      <rect width="390" height="844" rx="0"/>
    </clipPath>
    <clipPath id="sparkline-sol-clip">
      <rect x="0" y="0" width="48" height="24"/>
    </clipPath>
    <clipPath id="sparkline-btc-clip">
      <rect x="0" y="0" width="48" height="24"/>
    </clipPath>
    <clipPath id="sparkline-eth-clip">
      <rect x="0" y="0" width="48" height="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#0d0e10"/>

  <!-- ====== STATUS BAR ====== -->
  <g id="status-bar">
    <!-- Time -->
    <text x="16" y="22" font-family="Inter, sans-serif" font-weight="600" font-size="15" fill="#fdfbfe">9:41</text>
    <!-- Signal bars -->
    <g id="signal" transform="translate(312, 10)">
      <rect x="0" y="6" width="3" height="6" rx="1" fill="#fdfbfe"/>
      <rect x="5" y="4" width="3" height="8" rx="1" fill="#fdfbfe"/>
      <rect x="10" y="2" width="3" height="10" rx="1" fill="#fdfbfe"/>
      <rect x="15" y="0" width="3" height="12" rx="1" fill="#fdfbfe" opacity="0.4"/>
    </g>
    <!-- Wifi -->
    <g id="wifi" transform="translate(336, 10)">
      <path d="M8,10 Q8,6 12,4 Q16,6 16,10" stroke="#fdfbfe" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M5,8 Q5,2 12,0 Q19,2 19,8" stroke="#fdfbfe" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      <circle cx="12" cy="12" r="1.5" fill="#fdfbfe"/>
    </g>
    <!-- Battery -->
    <g id="battery" transform="translate(358, 11)">
      <rect x="0" y="0" width="22" height="11" rx="2.5" stroke="#fdfbfe" stroke-width="1.2" fill="none"/>
      <rect x="22.5" y="3" width="2" height="5" rx="1" fill="#fdfbfe" opacity="0.5"/>
      <rect x="1.5" y="1.5" width="16" height="8" rx="1.5" fill="#fdfbfe"/>
    </g>
  </g>

  <!-- ====== HEADER ====== -->
  <g id="header">
    <text x="16" y="60" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="20" fill="#fdfbfe">Market</text>
    <!-- Bell icon -->
    <g id="bell-icon" transform="translate(350, 44)">
      <path d="M12,2 C8.686,2 6,4.686 6,8 L6,12 L4,14 L4,15 L20,15 L20,14 L18,12 L18,8 C18,4.686 15.314,2 12,2 Z" stroke="#fdfbfe" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
      <path d="M10,15 Q10,17 12,17 Q14,17 14,15" stroke="#fdfbfe" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ====== SEARCH BAR ====== -->
  <g id="search-bar">
    <rect x="16" y="72" width="358" height="44" rx="24" fill="#1e2022"/>
    <!-- Search icon -->
    <circle cx="42" cy="94" r="8" stroke="#ababad" stroke-width="1.5" fill="none"/>
    <line x1="48" y1="100" x2="53" y2="105" stroke="#ababad" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Placeholder text -->
    <text x="62" y="99" font-family="Inter, sans-serif" font-weight="400" font-size="14" fill="#ababad">Search tokens...</text>
  </g>

  <!-- ====== FILTER CHIPS ====== -->
  <g id="filter-chips">
    <!-- All (active) -->
    <rect x="16" y="128" width="38" height="32" rx="6" fill="#00ffa3"/>
    <text x="35" y="149" font-family="Inter, sans-serif" font-weight="500" font-size="12" fill="#0d0e10" text-anchor="middle">All</text>
    <!-- Solana -->
    <rect x="62" y="128" width="58" height="32" rx="6" fill="#1e2022"/>
    <text x="91" y="149" font-family="Inter, sans-serif" font-weight="500" font-size="12" fill="#fdfbfe" text-anchor="middle">Solana</text>
    <!-- DeFi -->
    <rect x="128" y="128" width="44" height="32" rx="6" fill="#1e2022"/>
    <text x="150" y="149" font-family="Inter, sans-serif" font-weight="500" font-size="12" fill="#fdfbfe" text-anchor="middle">DeFi</text>
    <!-- Stablecoins -->
    <rect x="180" y="128" width="87" height="32" rx="6" fill="#1e2022"/>
    <text x="223.5" y="149" font-family="Inter, sans-serif" font-weight="500" font-size="12" fill="#fdfbfe" text-anchor="middle">Stablecoins</text>
  </g>

  <!-- ====== TOKEN LIST ====== -->
  <g id="token-list">

    <!-- Column headers -->
    <text x="70" y="180" font-family="Inter, sans-serif" font-weight="500" font-size="11" fill="#ababad">Token</text>
    <text x="240" y="180" font-family="Inter, sans-serif" font-weight="500" font-size="11" fill="#ababad">Price</text>
    <text x="350" y="180" font-family="Inter, sans-serif" font-weight="500" font-size="11" fill="#ababad" text-anchor="middle">24h</text>

    <!-- ROW 1: SOL -->
    <g id="token-sol" transform="translate(16, 188)">
      <rect x="0" y="0" width="358" height="56" rx="12" fill="#121316"/>
      <!-- Icon circle -->
      <circle cx="28" cy="28" r="16" fill="#9945FF" fill-opacity="0.2"/>
      <text x="28" y="33" font-family="Inter, sans-serif" font-weight="700" font-size="14" fill="#9945FF" text-anchor="middle">S</text>
      <!-- Token name + ticker -->
      <text x="52" y="24" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#fdfbfe">Solana</text>
      <text x="52" y="40" font-family="Inter, sans-serif" font-weight="400" font-size="12" fill="#ababad">SOL</text>
      <!-- Price -->
      <text x="215" y="24" font-family="'DM Mono', monospace" font-weight="400" font-size="13" fill="#fdfbfe">$148.32</text>
      <!-- Sparkline up -->
      <g transform="translate(272, 16)" clip-path="url(#sparkline-sol-clip)">
        <polyline points="0,20 8,16 16,14 24,10 32,8 40,5 48,2" stroke="#00ffa3" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <!-- 24h% -->
      <text x="328" y="32" font-family="'DM Mono', monospace" font-weight="400" font-size="11" fill="#00ffa3">+5.2%</text>
    </g>

    <!-- ROW 2: BTC -->
    <g id="token-btc" transform="translate(16, 252)">
      <rect x="0" y="0" width="358" height="56" rx="12" fill="#121316"/>
      <circle cx="28" cy="28" r="16" fill="#F7931A" fill-opacity="0.2"/>
      <text x="28" y="33" font-family="Inter, sans-serif" font-weight="700" font-size="13" fill="#F7931A" text-anchor="middle">₿</text>
      <text x="52" y="24" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#fdfbfe">Bitcoin</text>
      <text x="52" y="40" font-family="Inter, sans-serif" font-weight="400" font-size="12" fill="#ababad">BTC</text>
      <text x="206" y="24" font-family="'DM Mono', monospace" font-weight="400" font-size="13" fill="#fdfbfe">$67,421</text>
      <g transform="translate(272, 16)">
        <polyline points="0,18 8,15 16,13 24,11 32,9 40,6 48,4" stroke="#00ffa3" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="328" y="32" font-family="'DM Mono', monospace" font-weight="400" font-size="11" fill="#00ffa3">+1.8%</text>
    </g>

    <!-- ROW 3: ETH -->
    <g id="token-eth" transform="translate(16, 316)">
      <rect x="0" y="0" width="358" height="56" rx="12" fill="#121316"/>
      <circle cx="28" cy="28" r="16" fill="#627EEA" fill-opacity="0.2"/>
      <text x="28" y="33" font-family="Inter, sans-serif" font-weight="700" font-size="13" fill="#627EEA" text-anchor="middle">Ξ</text>
      <text x="52" y="24" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#fdfbfe">Ethereum</text>
      <text x="52" y="40" font-family="Inter, sans-serif" font-weight="400" font-size="12" fill="#ababad">ETH</text>
      <text x="210" y="24" font-family="'DM Mono', monospace" font-weight="400" font-size="13" fill="#fdfbfe">$3,102</text>
      <g transform="translate(272, 16)">
        <polyline points="0,4 8,6 16,9 24,12 32,15 40,18 48,20" stroke="#ff716c" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="328" y="32" font-family="'DM Mono', monospace" font-weight="400" font-size="11" fill="#ff716c">-2.1%</text>
    </g>

    <!-- ROW 4: USDC -->
    <g id="token-usdc" transform="translate(16, 380)">
      <rect x="0" y="0" width="358" height="56" rx="12" fill="#121316"/>
      <circle cx="28" cy="28" r="16" fill="#2775CA" fill-opacity="0.2"/>
      <text x="28" y="33" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#2775CA" text-anchor="middle">$</text>
      <text x="52" y="24" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#fdfbfe">USD Coin</text>
      <text x="52" y="40" font-family="Inter, sans-serif" font-weight="400" font-size="12" fill="#ababad">USDC</text>
      <text x="216" y="24" font-family="'DM Mono', monospace" font-weight="400" font-size="13" fill="#fdfbfe">$1.00</text>
      <g transform="translate(272, 16)">
        <polyline points="0,12 8,12 16,11 24,12 32,12 40,11 48,12" stroke="#ababad" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="328" y="32" font-family="'DM Mono', monospace" font-weight="400" font-size="11" fill="#ababad">0.0%</text>
    </g>

    <!-- ROW 5: LIMER -->
    <g id="token-limer" transform="translate(16, 444)">
      <rect x="0" y="0" width="358" height="56" rx="12" fill="#121316"/>
      <circle cx="28" cy="28" r="16" fill="#00ffa3" fill-opacity="0.15"/>
      <text x="28" y="33" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#00ffa3" text-anchor="middle">L</text>
      <text x="52" y="24" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#fdfbfe">$LIMER</text>
      <text x="52" y="40" font-family="Inter, sans-serif" font-weight="400" font-size="12" fill="#ababad">LIMER</text>
      <text x="210" y="24" font-family="'DM Mono', monospace" font-weight="400" font-size="13" fill="#fdfbfe">$0.042</text>
      <g transform="translate(272, 16)">
        <polyline points="0,22 8,18 16,14 24,10 32,7 40,4 48,1" stroke="#00ffa3" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="324" y="32" font-family="'DM Mono', monospace" font-weight="400" font-size="11" fill="#00ffa3">+12.4%</text>
    </g>

    <!-- ROW 6: RAY -->
    <g id="token-ray" transform="translate(16, 508)">
      <rect x="0" y="0" width="358" height="56" rx="12" fill="#121316"/>
      <circle cx="28" cy="28" r="16" fill="#bf81ff" fill-opacity="0.2"/>
      <text x="28" y="33" font-family="Inter, sans-serif" font-weight="700" font-size="13" fill="#bf81ff" text-anchor="middle">R</text>
      <text x="52" y="24" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#fdfbfe">Raydium</text>
      <text x="52" y="40" font-family="Inter, sans-serif" font-weight="400" font-size="12" fill="#ababad">RAY</text>
      <text x="216" y="24" font-family="'DM Mono', monospace" font-weight="400" font-size="13" fill="#fdfbfe">$2.84</text>
      <g transform="translate(272, 16)">
        <polyline points="0,16 8,14 16,12 24,10 32,8 40,6 48,4" stroke="#00ffa3" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="328" y="32" font-family="'DM Mono', monospace" font-weight="400" font-size="11" fill="#00ffa3">+3.7%</text>
    </g>

    <!-- ROW 7: JUP -->
    <g id="token-jup" transform="translate(16, 572)">
      <rect x="0" y="0" width="358" height="56" rx="12" fill="#121316"/>
      <circle cx="28" cy="28" r="16" fill="#FFCA3A" fill-opacity="0.2"/>
      <text x="28" y="33" font-family="Inter, sans-serif" font-weight="700" font-size="13" fill="#FFCA3A" text-anchor="middle">J</text>
      <text x="52" y="24" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#fdfbfe">Jupiter</text>
      <text x="52" y="40" font-family="Inter, sans-serif" font-weight="400" font-size="12" fill="#ababad">JUP</text>
      <text x="216" y="24" font-family="'DM Mono', monospace" font-weight="400" font-size="13" fill="#fdfbfe">$1.12</text>
      <g transform="translate(272, 16)">
        <polyline points="0,6 8,8 16,10 24,12 32,14 40,16 48,18" stroke="#ff716c" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="328" y="32" font-family="'DM Mono', monospace" font-weight="400" font-size="11" fill="#ff716c">-0.8%</text>
    </g>

    <!-- ROW 8: BONK -->
    <g id="token-bonk" transform="translate(16, 636)">
      <rect x="0" y="0" width="358" height="56" rx="12" fill="#121316"/>
      <circle cx="28" cy="28" r="16" fill="#F7931A" fill-opacity="0.2"/>
      <text x="28" y="33" font-family="Inter, sans-serif" font-weight="700" font-size="12" fill="#F7931A" text-anchor="middle">B</text>
      <text x="52" y="24" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#fdfbfe">Bonk</text>
      <text x="52" y="40" font-family="Inter, sans-serif" font-weight="400" font-size="12" fill="#ababad">BONK</text>
      <text x="192" y="24" font-family="'DM Mono', monospace" font-weight="400" font-size="13" fill="#fdfbfe">$0.000024</text>
      <g transform="translate(272, 16)">
        <polyline points="0,18 8,15 16,12 24,9 32,7 40,5 48,2" stroke="#00ffa3" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="328" y="32" font-family="'DM Mono', monospace" font-weight="400" font-size="11" fill="#00ffa3">+8.1%</text>
    </g>

  </g>

  <!-- ====== BOTTOM NAV ====== -->
  <g id="bottom-nav">
    <!-- Nav background -->
    <rect x="0" y="788" width="390" height="56" fill="#121316"/>
    <!-- Top border -->
    <line x1="0" y1="788" x2="390" y2="788" stroke="#47484a66" stroke-width="1"/>

    <!-- Home tab -->
    <g id="nav-home" transform="translate(19, 800)">
      <path d="M39,20 L39,10 L46,4 L53,10 L53,20" stroke="#ababad" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
      <rect x="42" y="14" width="8" height="6" rx="1" stroke="#ababad" stroke-width="1.5" fill="none"/>
      <text x="46" y="36" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#ababad" text-anchor="middle">Home</text>
    </g>

    <!-- Market tab (ACTIVE) -->
    <g id="nav-market" transform="translate(97, 800)">
      <rect x="34" y="4" width="16" height="16" rx="2" stroke="#00ffa3" stroke-width="1.5" fill="none"/>
      <line x1="38" y1="8" x2="46" y2="8" stroke="#00ffa3" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="38" y1="12" x2="46" y2="12" stroke="#00ffa3" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="38" y1="16" x2="42" y2="16" stroke="#00ffa3" stroke-width="1.5" stroke-linecap="round"/>
      <text x="42" y="36" font-family="Inter, sans-serif" font-weight="500" font-size="10" fill="#00ffa3" text-anchor="middle">Market</text>
    </g>

    <!-- Trade tab -->
    <g id="nav-trade" transform="translate(175, 800)">
      <path d="M38,20 L38,10" stroke="#ababad" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M46,20 L46,6" stroke="#ababad" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M54,20 L54,14" stroke="#ababad" stroke-width="1.5" stroke-linecap="round"/>
      <text x="46" y="36" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#ababad" text-anchor="middle">Trade</text>
    </g>

    <!-- Portfolio tab -->
    <g id="nav-portfolio" transform="translate(253, 800)">
      <circle cx="46" cy="12" r="8" stroke="#ababad" stroke-width="1.5" fill="none"/>
      <path d="M38,12 L54,12" stroke="#ababad" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M46,4 L46,20" stroke="#ababad" stroke-width="1.5" stroke-linecap="round"/>
      <text x="46" y="36" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#ababad" text-anchor="middle">Portfolio</text>
    </g>

    <!-- Profile tab -->
    <g id="nav-profile" transform="translate(315, 800)">
      <circle cx="46" cy="9" r="5" stroke="#ababad" stroke-width="1.5" fill="none"/>
      <path d="M36,22 Q36,16 46,16 Q56,16 56,22" stroke="#ababad" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <text x="46" y="36" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#ababad" text-anchor="middle">Profile</text>
    </g>

    <!-- Active indicator dot -->
    <circle cx="175" cy="789" r="2" fill="#00ffa3"/>
  </g>

  <!-- Home indicator bar -->
  <rect x="138" y="828" width="114" height="5" rx="2.5" fill="#fdfbfe" opacity="0.3"/>

</svg>
