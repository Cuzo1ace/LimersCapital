<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <!-- Background — showing dimmed dashboard behind -->
  <rect width="390" height="844" fill="#0d0e10"/>

  <!-- Dimmed dashboard content hint -->
  <g id="dimmed-content" opacity="0.3">
    <rect x="16" y="96" width="358" height="56" rx="12" fill="#121316"/>
    <rect x="16" y="168" width="358" height="170" rx="16" fill="#121316"/>
    <rect x="16" y="354" width="80" height="80" rx="12" fill="#121316"/>
    <rect x="108" y="354" width="80" height="80" rx="12" fill="#121316"/>
    <rect x="200" y="354" width="80" height="80" rx="12" fill="#121316"/>
    <rect x="292" y="354" width="80" height="80" rx="12" fill="#121316"/>
    <rect x="16" y="460" width="358" height="56" rx="12" fill="#121316"/>
    <rect x="16" y="524" width="358" height="56" rx="12" fill="#121316"/>
  </g>

  <!-- Status bar -->
  <g id="status-bar">
    <text x="32" y="20" font-family="Inter" font-weight="600" font-size="14" fill="#fdfbfe">9:41</text>
    <g transform="translate(358,8)">
      <rect x="0" y="1" width="22" height="10" rx="2" stroke="#fdfbfe" stroke-width="1" fill="none"/>
      <rect x="2" y="3" width="16" height="6" rx="1" fill="#00ffa3"/>
    </g>
  </g>

  <!-- Header -->
  <g id="header">
    <circle cx="40" cy="70" r="14" fill="#00ffa3" opacity="0.15"/>
    <text x="38" y="75" font-family="Space Grotesk" font-weight="700" font-size="14" fill="#00ffa3" text-anchor="middle">L</text>
    <text x="60" y="75" font-family="Space Grotesk" font-weight="700" font-size="18" fill="#fdfbfe">Limer's</text>
  </g>

  <!-- ==================== INSTALL PROMPT BANNER ==================== -->
  <g id="install-prompt">
    <!-- Banner background -->
    <rect x="0" y="740" width="390" height="104" fill="#121316"/>
    <line x1="0" y1="740" x2="390" y2="740" stroke="#47484a66" stroke-width="1"/>

    <!-- Content -->
    <g transform="translate(16,752)">
      <!-- App icon -->
      <rect x="0" y="4" width="44" height="44" rx="12" fill="#00ffa3" opacity="0.15"/>
      <text x="22" y="32" font-family="Space Grotesk" font-weight="700" font-size="18" fill="#00ffa3" text-anchor="middle">L</text>

      <!-- Text -->
      <text x="56" y="18" font-family="Space Grotesk" font-weight="600" font-size="14" fill="#fdfbfe">Install Limer's Capital</text>
      <text x="56" y="36" font-family="Inter" font-size="12" fill="#ababad">Add to Home Screen for the best experience</text>

      <!-- Install button -->
      <rect x="56" y="44" width="100" height="36" rx="18" fill="#00ffa3"/>
      <text x="106" y="67" font-family="Inter" font-weight="600" font-size="13" fill="#0d0e10" text-anchor="middle">Install</text>

      <!-- Dismiss button -->
      <rect x="168" y="44" width="80" height="36" rx="18" fill="transparent" stroke="#47484a66" stroke-width="1"/>
      <text x="208" y="67" font-family="Inter" font-weight="500" font-size="13" fill="#ababad" text-anchor="middle">Dismiss</text>

      <!-- Close X -->
      <g transform="translate(338,4)">
        <line x1="0" y1="0" x2="12" y2="12" stroke="#ababad" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="12" y1="0" x2="0" y2="12" stroke="#ababad" stroke-width="1.5" stroke-linecap="round"/>
      </g>
    </g>
  </g>
</svg>